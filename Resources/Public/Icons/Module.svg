        <line x1="8" y1="20" x2="32" y2="20" stroke="#4a90d9" stroke-width="2" stroke-linecap="round"/>
        <line x1="8" y1="28" x2="28" y2="28" stroke="#4a90d9" stroke-width="2" stroke-linecap="round"/>
