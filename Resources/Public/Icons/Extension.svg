<svg xmlns="http://www.w3.org/2000/svg" width="160" height="160"
     viewBox="0 0 160 160">
    <defs>
        <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#4a90d9;stop-opacity:1"/>
            <stop offset="100%" style="stop-color:#2c5aa0;stop-opacity:1"/>
        </linearGradient>
    </defs>
    <rect width="160" height="160" rx="20" fill="url(#bg)"/>
    <g transform="translate(40, 40)">
        <!-- Page icon -->
        <rect x="0" y="0" width="80" height="100" rx="5" fill="white" opacity="0.9"/>
        <line x1="15" y1="25" x2="65" y2="25" stroke="#4a90d9" stroke-width="3" stroke-linecap="round"/>
        <line x1="15" y1="40" x2="65" y2="40" stroke="#4a90d9" stroke-width="3" stroke-linecap="round"/>
        <line x1="15" y1="55" x2="50" y2="55" stroke="#4a90d9" stroke-width="3" stroke-linecap="round"/>
        <!-- Status indicator -->
        <circle cx="65" cy="75" r="12" fill="#28a745"/>
        <path d="M60 75 L63 78 L70 71" stroke="white" stroke-width="3" fill="none" stroke-linecap="round"
              stroke-linejoin="round"/>
    </g>
</svg>
